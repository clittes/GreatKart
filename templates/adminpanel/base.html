
{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>GreatKart Admin</title>

    <!-- Bootstrap -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- HEADER -->

    <header class="py-3">

        <div class="row align-items-center">

            <div class="col-md-4">
                <a href="{% url 'home' %}">
               <img class="logo" src="/static/images/logo.png">
            </div></a>

            <div class="col-md-4">

           <form action="{% url 'search_users' %}" method="GET"> 
            <div class="input-group"> <input type="text" name="keyword" class="form-control" placeholder="Search users..." value="{{ keyword }}"> 
                <div class="input-group-append">
                     <button class="btn btn-primary" type="submit"> Search </button> 
                     <a href="{% url 'admin_dashboard' %}" class="btn btn-secondary"> Clear </a> 
                    </div>
                 </div>
                 </form>

            </div>

            <div class="col-md-4 text-right">

                <a href="{% url 'admin_dashboard' %}">
                    Dashboard
                </a>

                &nbsp;&nbsp;

                <a href="{% url 'logout' %}">
                    Logout
                </a>

            </div>

        </div>

    </header>

    <hr>

    <!-- MAIN -->

    <div class="row">

        <!-- SIDEBAR -->

        <div class="col-md-3">

            <div class="list-group">

                <a href="{% url 'admin_dashboard' %}"
                   class="list-group-item">

                    Dashboard

                </a>

                <a href="#"
                   class="list-group-item active">

                    Users

                </a>

                <a href="#"
                   class="list-group-item">

                    Categories

                </a>

                <a href="#"
                   class="list-group-item">

                    Products

                </a>

                <a href="#"
                   class="list-group-item">

                    Orders

                </a>

                <a href="{% url 'logout' %}"
                   class="list-group-item">

                    Logout

                </a>

            </div>

        </div>

        <!-- CONTENT -->

        <div class="col-md-9">

            {% block content %}

            {% endblock %}

        </div>

    </div>

    <!-- FOOTER -->

    <footer class="mt-5 p-4 bg-light text-center">

        GreatKart Admin Panel

    </footer>

</div>

</body>

</html>
```
